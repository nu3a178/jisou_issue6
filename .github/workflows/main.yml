name : test
on :
    schedule :
      - cron : "0 6 * * *"
    workflow_dispatch:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'
          cache: "npm"
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: make test